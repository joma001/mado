name: Mado
options:
  bundleIdPrefix: com.mado
  deploymentTarget:
    macOS: "14.0"
    iOS: "17.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "5.9"

packages:
  GoogleSignIn:
    url: https://github.com/google/GoogleSignIn-iOS
    from: "8.0.0"
  KeyboardShortcuts:
    url: https://github.com/sindresorhus/KeyboardShortcuts
    from: "2.0.0"

targets:
  Mado:
    type: application
    platform: macOS
    sources:
      - path: Mado
    settings:
      base:
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        PRODUCT_BUNDLE_IDENTIFIER: io.mado.app
        INFOPLIST_FILE: Mado/Info.plist
        CODE_SIGN_ENTITLEMENTS: Mado/Mado.entitlements
        PRODUCT_NAME: mado
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        GENERATE_INFOPLIST_FILE: false
        ENABLE_HARDENED_RUNTIME: false
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGN_STYLE: Manual
    dependencies:
      - package: GoogleSignIn
        product: GoogleSignIn
      - package: KeyboardShortcuts
        product: KeyboardShortcuts
    entitlements:
      path: Mado/Mado.entitlements
      properties:
        com.apple.security.app-sandbox: false
        com.apple.security.network.client: true

  MadoiOS:
    type: application
    platform: iOS
    sources:
      - path: Mado
        excludes:
          - "MadoApp.swift"
          - "Info.plist"
          - "Mado.entitlements"
          - "Features/MenuBar/**"
          - "Features/Todo/QuickAddTaskWindow.swift"
          - "Core/KeyboardShortcuts+Mado.swift"
          - "Features/Settings/ShortcutsSettingsTab.swift"
          - "Features/Todo/TodoListView.swift"
          - "Features/Todo/TodoDetailView.swift"
          - "Features/Todo/TodoFormView.swift"
          - "Features/Todo/TodoRowView.swift"
      - path: MadoiOS
      - path: MadoWidget/WidgetSharedModels.swift
    settings:
      base:
        IPHONEOS_DEPLOYMENT_TARGET: "17.0"
        PRODUCT_BUNDLE_IDENTIFIER: io.mado.mobile
        INFOPLIST_FILE: MadoiOS/Info.plist
        CODE_SIGN_ENTITLEMENTS: MadoiOS/MadoiOS.entitlements
        PRODUCT_NAME: mado
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        GENERATE_INFOPLIST_FILE: false
        TARGETED_DEVICE_FAMILY: "1,2"
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_IDENTITY: "Apple Development"
        DEVELOPMENT_TEAM: NMUF95SNG5
    dependencies:
      - package: GoogleSignIn
        product: GoogleSignIn
      - target: MadoWidgetExtension
        embed: true
    entitlements:
      path: MadoiOS/MadoiOS.entitlements
      properties:
        com.apple.security.application-groups:
          - group.io.mado.mobile

  MadoWidgetExtension:
    type: app-extension
    platform: iOS
    sources:
      - path: MadoWidget
    settings:
      base:
        IPHONEOS_DEPLOYMENT_TARGET: "17.0"
        PRODUCT_BUNDLE_IDENTIFIER: io.mado.mobile.widget
        CODE_SIGN_ENTITLEMENTS: MadoWidget/MadoWidget.entitlements
        PRODUCT_NAME: MadoWidgetExtension
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        GENERATE_INFOPLIST_FILE: true
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_IDENTITY: "Apple Development"
        DEVELOPMENT_TEAM: NMUF95SNG5
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/Frameworks @executable_path/../../Frameworks"
    info:
      path: MadoWidget/Info.plist
      properties:
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
